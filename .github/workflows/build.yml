name: Android Build (Buildozer)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install Git
        run: |
          sudo apt-get update
          sudo apt-get install -y git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-venv python3-pip git unzip openjdk-11-jdk build-essential libssl-dev libffi-dev zlib1g-dev libbz2-dev libreadline-dev libsqlite3-dev libncursesw5-dev wget

      - name: Install Android SDK command-line tools and packages
        run: |
          # set SDK location
          export ANDROID_HOME=$HOME/Android/Sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          mkdir -p $ANDROID_HOME/cmdline-tools

          # download commandline tools
          curl -sSLo cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools_temp
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          mv $ANDROID_HOME/cmdline-tools_temp/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
          rm -rf cmdline-tools.zip $ANDROID_HOME/cmdline-tools_temp

          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

          # Accept licenses non-interactively and install required packages
          yes | sdkmanager --sdk_root=${ANDROID_HOME} --licenses || true
          sdkmanager --sdk_root=${ANDROID_HOME} "platform-tools" "platforms;android-31" "build-tools;37.0.0"


      - name: Create Python venv
        run: |
          python3 -m venv venv
          . venv/bin/activate
          python -V
          pip install --upgrade pip setuptools wheel

      - name: Install python packages
        run: |
          . venv/bin/activate
          pip install Cython==0.29.34 buildozer

      - name: Ensure build ignores credentials
        run: |
          echo "gimrutine-*.json" >> .buildozerignore || true
          echo ".venv" >> .buildozerignore || true

      - name: Add minimal presplash image
        run: |
          mkdir -p data
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAAWgmWQ0AAAAASUVORK5CYII=" | base64 -d > data/presplash.png

      - name: Run Buildozer
        env:
          JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
        run: |
          . venv/bin/activate
          pip install --upgrade pip
          buildozer -v android debug --assume-yes

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gimroutine-apk
          path: |
            **/*.apk
            ./.buildozer/android/app/bin/*.apk
            ./bin/*.apk