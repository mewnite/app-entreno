name: Android Build (Buildozer)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-venv python3-pip git unzip openjdk-11-jdk build-essential libssl-dev libffi-dev zlib1g-dev libbz2-dev libreadline-dev libsqlite3-dev libncursesw5-dev libgdbm-dev liblzma-dev pkg-config

      - name: Create Python venv
        run: |
          python3 -m venv venv
          source venv/bin/activate
          python -V
          pip install --upgrade pip setuptools wheel

      - name: Install python packages
        run: |
          source venv/bin/activate
          pip install Cython==0.29.34 buildozer

      - name: Ensure build ignores credentials
        run: |
          echo "gimrutine-*.json" >> .buildozerignore || true
          echo ".venv" >> .buildozerignore || true

      - name: Add minimal presplash image
        run: |
          mkdir -p data
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAAWgmWQ0AAAAASUVORK5CYII=" | base64 -d > data/presplash.png

      - name: Run Buildozer
        env:
          JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
        run: |
          source venv/bin/activate
          pip install --upgrade pip
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: gimroutine-apk
          path: |
            **/*.apk
            ./.buildozer/android/app/bin/*.apk
            ./bin/*.apk