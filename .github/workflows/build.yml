name: Android Build (Buildozer)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install Git
        run: |
          sudo apt-get update
          sudo apt-get install -y git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-venv python3-pip git unzip build-essential libssl-dev libffi-dev zlib1g-dev libbz2-dev libreadline-dev libsqlite3-dev libncursesw5-dev wget libltdl-dev autoconf-archive

      - name: Setup Android SDK + FIX sdkmanager
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          mkdir -p $ANDROID_HOME

          # Descargamos cmdline-tools actual
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p $ANDROID_HOME/cmdline-tools
          mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          rm cmdline-tools.zip

          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

          echo "=== Java version ==="
          java -version
          echo "===================="

          # Licencias
          mkdir -p $ANDROID_HOME/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_HOME/licenses/android-sdk-preview-license
          echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" >> $ANDROID_HOME/licenses/android-sdk-license

          # Instalamos paquetes
          sdkmanager --sdk_root=${ANDROID_HOME} \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;34.0.0" \
            "cmdline-tools;latest"

          # Wrapper definitivo sdkmanager
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/tools/bin
          echo '#!/bin/bash' > /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          echo 'exec /home/runner/android-sdk/cmdline-tools/latest/bin/sdkmanager "$@"' >> /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          chmod +x /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager

          # Copiamos SDK a carpeta de Buildozer
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk
          cp -r $ANDROID_HOME/* /home/runner/.buildozer/android/platform/android-sdk/ 2>/dev/null || true

          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses
          cp -r $ANDROID_HOME/licenses/* /home/runner/.buildozer/android/platform/android-sdk/licenses/ 2>/dev/null || true

          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROIDSDK=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Create Python venv
        run: |
          python3 -m venv venv
          . venv/bin/activate
          python -V
          pip install --upgrade pip setuptools wheel

      - name: Install python packages
        run: |
          . venv/bin/activate
          pip install Cython==0.29.34 buildozer

      - name: Ensure build ignores credentials
        run: |
          echo "gimrutine-*.json" >> .buildozerignore || true
          echo ".venv" >> .buildozerignore || true

      - name: Add minimal presplash image
        run: |
          mkdir -p data
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAAWgmWQ0AAAAASUVORK5CYII=" | base64 -d > data/presplash.png

      - name: Run Buildozer
        env:
          ANDROID_HOME: /home/runner/android-sdk
          ANDROID_SDK_ROOT: /home/runner/android-sdk
          ANDROIDSDK: /home/runner/android-sdk
          P4A_ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
        run: |
          . venv/bin/activate
          pip install --upgrade pip
          buildozer -v android debug --assume-yes

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gimroutine-apk
          path: |
            **/*.apk
            ./.buildozer/android/app/bin/*.apk
            ./bin/*.apk